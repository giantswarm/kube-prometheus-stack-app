global:
  imagePullSecrets: []
  imageRegistry: docker.io
  rbac:
    create: true
    pspEnabled: true
prometheus-operator-app:
  alertmanager:
    alertmanagerSpec:
      image:
        repository: giantswarm/alertmanager
    ingress:
      ingressClassName: nginx
      pathType: ImplementationSpecific
    ingressPerReplica:
      ingressClassName: nginx
      pathType: ImplementationSpecific
  coreDns:
    enabled: true
    # This PR fixes the coredns service as we use the `k8s-app: coredns` label
    service:
      selector:
        k8s-app: coredns
  grafana:
    rbac:
      pspEnabled: true
      pspUseAppArmor: false
    ingress:
      ingressClassName: nginx
  kubeApiServer:
    enabled: true
  kubelet:
    enabled: true
  kubeControllerManager:
    enabled: true
  kubeEtcd:
    enabled: true
  kubeProxy:
    enabled: true
  kubeScheduler:
    enabled: true
  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    # TODO Add Cilium Network Policy https://github.com/giantswarm/kube-state-metrics-app/pull/183
    image:
      repository: giantswarm/kube-state-metrics
    metricLabelsAllowlist:
    - daemonsets=[giantswarm.io/monitoring_basic_sli, giantswarm.io/service-type, app.kubernetes.io/name, application.giantswarm.io/team]
    - deployments=[giantswarm.io/monitoring_basic_sli, giantswarm.io/service-type, app.kubernetes.io/name, application.giantswarm.io/team]
    - nodes=[ip, giantswarm.io/machine-pool, giantswarm.io/machine-deployment, topology.kubernetes.io/region, topology.kubernetes.io/zone]
    - statefulsets=[giantswarm.io/monitoring_basic_sli, giantswarm.io/service-type, app.kubernetes.io/name, application.giantswarm.io/team]
    networkPolicy:
      enabled: true
      egress:
      - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 100.64.0.0/10
      ingress:
      - ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
    podAnnotations:
      cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    podSecurityPolicy:
      enabled: true
    # Remove prometheus.io/scrape annotation
    prometheus:
      monitor:
        enabled: true
        relabelings:
        - action: labeldrop
          regex: uid|container_id
    prometheusScrape: false
    ## We set resources so VPA can do its thing
    resources:
      requests:
        cpu: 200m
        memory: 200Mi
      limits:
        cpu: 200m
        memory: 200Mi
    selfMonitor:
      enabled: true
    verticalPodAutoscaler:
      enabled: true
  nodeExporter:
    enabled: false
  prometheus-node-exporter:
    rbac:
      pspEnabled: true
  prometheus:
    prometheusSpec:
      image:
        repository: giantswarm/prometheus
    ingress:
      ingressClassName: nginx
      pathType: ImplementationSpecific
    ingressPerReplica:
      ingressClassName: nginx
      pathType: ImplementationSpecific
    thanosIngress:
      ingressClassName: nginx
      pathType: ImplementationSpecific
  prometheusOperator:
    enabled: true
    admissionWebhooks:
      patch:
        image:
          # We have 2 images for this: https://github.com/giantswarm/retagger/blob/dc815cbec228a32d7dc1859e6e3c73bef5488b52/images.yaml#L1069 and https://github.com/giantswarm/retagger/blob/dc815cbec228a32d7dc1859e6e3c73bef5488b52/images.yaml#L513
          # The jettech one is old and does not work with Kubernetes 1.22. We need to deprecate it later.
          repository: giantswarm/ingress-nginx-kube-webhook-certgen
    alertmanagerDefaultBaseImage: giantswarm/alertmanager
    image:
      repository: giantswarm/prometheus-operator
    labels:
      giantswarm.io/monitoring_basic_sli: "true"
    prometheusConfigReloader:
      image:
        repository: giantswarm/prometheus-config-reloader
    prometheusDefaultBaseImage: giantswarm/prometheus
    networkPolicy:
      enabled: true
    secretFieldSelector: "type!=helm.sh/release.v1"
    thanosImage:
      repository: giantswarm/thanos
    verticalPodAutoscaler:
      enabled: true
  thanosRuler:
    enabled: false
    thanosRulerSpec:
      image:
        repository: giantswarm/thanos
    ingress:
      ingressClassName: nginx
      pathType: ImplementationSpecific
